server:
  port: ${SERVER_PORT:8101}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sd_kanban}?useUnicode=true&characterEncoding=utf8&serverTimezone=${DB_TIMEZONE:Asia/Shanghai}&createDatabaseIfNotExist=${DB_CREATE_DATABASE_IF_NOT_EXIST:true}}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}

app:
  auth:
    registration-enabled: ${REGISTRATION_ENABLED:false}
    default-admin:
      enabled: ${DEFAULT_ADMIN_ENABLED:true}
      account: ${DEFAULT_ADMIN_ACCOUNT:sd-robot}
      password: ${DEFAULT_ADMIN_PASSWORD:1}
      nickname: ${DEFAULT_ADMIN_NICKNAME:系统管理员}
      email: ${DEFAULT_ADMIN_EMAIL:}
  jwt:
    secret: ${JWT_SECRET:sd-kanban-local-development-secret-change-before-production}
    expires-minutes: ${JWT_EXPIRES_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8102,http://127.0.0.1:8102}
